# benchmark — runtime config (key=value).
# CLI flags to main.py override every value here.
# All paths are relative to this app folder.

# Compiled model package to benchmark. `assets/models/` is git-ignored — build the
# archive with ../../model-compilation, or download one from the model zoo, and
# drop it here.
model_path=./assets/models/yolo_v8n_mpk.tar.gz

# Number of synthetic frames to measure. More frames = a steadier number.
frames=1000

# Where the JSON report is written. `output/` is git-ignored.
output_json=./output/yolo_v8n_benchmark.json
