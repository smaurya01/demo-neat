# USB camera -> YOLO26m object detection -> H.264 RTP/UDP
#
# Every value below is read by both main.cpp and main.py.

# ── Camera ────────────────────────────────────────────────────────────────────

# The capture node. On this DevKit the Logitech Brio 100 enumerates as:
#   /dev/video16 -> Video Capture    (use this one)
#   /dev/video17 -> Metadata Capture (UVC metadata, NOT image data)
# Confirm on your board with: v4l2-ctl --list-devices
camera_device=/dev/video16

# Capture resolution. 1920x1080 is the Brio 100's maximum.
width=1920
height=1080

# Capture rate. The camera sustains a true 30 fps at 1080p in MJPEG.
# Do not switch the source to raw YUYV: the camera only offers 5 fps for 1080p YUYV
# because uncompressed 4:2:2 does not fit in USB 2.0 bandwidth.
fps=30

# Correct an upside-down camera mount before inference. COCO models lose confidence
# on inverted scenes. One of: none | rotate-180 | horizontal-flip | vertical-flip
flip=none

# ── Model ─────────────────────────────────────────────────────────────────────
#
# Two yolo26m packages are shipped in assets/models/. Neither is in
# `sima-cli modelzoo list` -- the yolo26 family is published as a direct download:
#   sima-cli download https://docs.sima.ai/pkg_downloads/SDK2.1.2/models/modalix/yolo26-detection/<name>.tar.gz
#
#   bf16 (default)  yolo26m-det-bf16-mla_tess-b1   66 MB   infer 30.3 ms   scores 0.0-1.0
#   int8            yolo26m-det-int8-b1            35 MB   infer 15.9 ms   scores CAPPED AT 0.50
#
# Use bf16 unless you have a specific reason not to. It is the only one with usable
# confidence scores, and it is NOT the slower choice in practice: this pipeline is
# camera-limited at 30 fps, and bf16 already infers in 30 ms (~33 fps). int8's 2x faster
# inference buys ~0 end-to-end fps -- it only leaves the MLA idle longer.
#
# Use int8 when you need that MLA headroom for something else (a second model, more
# streams, a faster camera), AND you can live with the score limitation below.
#
# int8 limitation (measured, and it is the package's fault, not this app's):
#   Detections, classes and box geometry are correct and match bf16 exactly. But every
#   confidence score is capped at 0.50 -- objects bf16 scores at 0.88-0.90 come back as
#   exactly 0.50, and nothing ever exceeds 0.50. The package's class-score heads carry
#   dq_zp=[127,127,108], i.e. the zero-point sits at the TOP of the int8 range, so the
#   dequantized class logits can never be positive and sigmoid(0)=0.50 is a hard ceiling.
#   Consequence: score_threshold is compressed into 0.0-0.50 and is NOT comparable to
#   bf16. If you switch to int8, roughly halve your threshold (0.30 -> 0.15).
#   See LEARNING.md for the full investigation.
#
model_path=./assets/models/yolo26m-det-bf16-mla_tess-b1.tar.gz
#model_path=./assets/models/yolo26m-det-int8-b1.tar.gz

# Model input size. yolo26m is compiled for 640x640; changing this requires recompiling.
model_width=640
model_height=640

# Minimum detection confidence.
# bf16: 0.30 is sensible (scores span 0.0-1.0).
# int8: halve it (~0.15) -- int8 scores are capped at 0.50, so 0.30 there is equivalent
#       to demanding 0.60 from bf16 and will drop most true detections.
score_threshold=0.30

# NMS IoU threshold. YOLO26 heads are NMS-free, but Neat still runs a light dedup pass.
nms_iou=0.50

# Maximum detections returned per frame.
top_k=100

# COCO class count for the stock model.
num_classes=80

# ── Output ────────────────────────────────────────────────────────────────────

# Host that receives the H.264 RTP/UDP video stream. REQUIRED.
# Set this to the IP of the machine you want to watch the stream on.
udp_host=192.168.131.12

# UDP port for the H.264 video stream.
udp_port=5205

# H.264 encoder bitrate.
bitrate_kbps=4000

# Draw detection boxes onto the streamed video. push mode only (see pipeline_mode).
# Costs ~4 ms/frame on the CPU. Turn off if you render overlays downstream instead.
overlay=true

# Optional: host running Neat Insight, to receive detection JSON so Insight can render
# overlays itself. Leave empty to disable metadata sending.
metadata_host=

# UDP port for detection metadata.
metadata_port=9100

# ── Pipeline ──────────────────────────────────────────────────────────────────

# push  : camera -> appsrc -> CVU -> MLA -> boxdecode. Works on runtime 0.2.2.
#         The appsrc push is what lands frames in SiMa DMA memory for the CVU.
# graph : single zero-copy graph with a Branch. Faster on paper, but on runtime 0.2.2
#         the CVU reads system memory as black frames and returns ZERO detections,
#         because `neatcamerabridge` is absent from libsima_neat.so.2.1.2.
#         Only use with camera_bridge=true on a runtime that ships that element.
pipeline_mode=push

# Append `neatcamerabridge` to the source fragment. Requires a runtime that has it;
# runtime 0.2.2 does not, and enabling it there fails with `no element`.
camera_bridge=false

# Frames to process; 0 runs until Ctrl-C.
frames=0

# Seconds between time-profile lines. 0 turns the live profile off (the exit summary
# still prints). Every ms figure on the line is the mean over THAT WINDOW, not since
# start -- a cumulative mean hides a pipeline that degrades halfway through a run.
profile_interval=1.0

# Pipeline queue depth. 3 keeps latency low.
queue_depth=3

# Print the generated GStreamer backend pipeline at startup.
print_backend=false

# Dump the model's MPK contract and the planner's routing decisions: which packaged stages
# map onto which CVU/MLA nodes, and what gets fused into boxdecode. Verbose, but this is
# the tool that explains what a model package is actually doing -- it is how the int8
# score ceiling above was tracked down. Look for lines like:
#   session-route: post_fusion=user_boxdecode(cast+detess+dequant)->boxdecode
verbose_planner=false

# Diagnostic: replace the camera with any GStreamer fragment that ends producing NV12
# at width x height. Useful to validate the model against an image with a known answer:
#
#   source_override=multifilesrc location=/tmp/coco139.jpg loop=true caps=image/jpeg,framerate=30/1 ! jpegparse ! jpegdec ! videoscale ! videoconvert ! video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1 ! queue
#
# Leave empty to use the real camera.
source_override=
