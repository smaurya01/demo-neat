# detection-vlm-assistant runtime config (key=value, '#' comments).
# Every value is also overridable on the command line; run `python main.py --help`.

# ------------------------------------------------------------------ input ---
# source: rtsp (always-on camera demo) or image (still image / dir / glob).
source=rtsp

# RTSP H.264 input stream (source=rtsp).
rtsp_url=rtsp://<rtsp-server-ip>:8555/stream
# tcp for reliability or udp for lower latency.
rtsp_transport=tcp
# RTSP receiver jitter buffer in milliseconds.
latency_ms=200
# Fallbacks used only when the RTSP caps are incomplete.
fallback_width=1280
fallback_height=720
fallback_fps=30

# Still image(s) for source=image: a file, a directory, or a glob.
# image_path=../../tutorial/assets/images/image.png

# --------------------------------------------------------------- detector ---
# Compiled YOLO11n archive (Agent A's verified T1 artifact, copied into assets/).
model_path=./assets/models/yolo_11n_mpk.tar.gz
# Decode family. A compile_ready yolo11n exposes the YoloV26 head, so use yolo11
# (=> BoxDecodeType.YoloV26). Never YoloV8 for this archive.
model_name=yolo11
# Box-decode controls.
score_threshold=0.25
nms_iou=0.50
top_k=100
# Frames to process; 0 = run until interrupted (rtsp) / process all images.
frames=0
# Neat run timeout in milliseconds.
timeout_ms=20000

# ------------------------------------------------------------- video out ---
# Draw detection boxes on each frame and stream H.264/RTP over UDP, like the
# sibling single-stream apps. Every box is drawn WHITE; the one box the VLM
# would caption this frame (highest-score box passing the trigger gate) is drawn
# RED. Leave udp_host empty (or pass --no-video) to run detection-only on stdout.
video_enabled=true
# Host (viewer machine) that receives the UDP video.
udp_host=192.168.131.12
# UDP base port for the H.264/RTP stream (also settable as udp_port_base).
udp_port=9000
# H.264 encoder bitrate in kbps.
bitrate_kbps=4000

# -------------------------------------------------------------------- vlm ---
# The VLM leg. When vlm_enabled=false OR the model dir is missing OR --no-vlm is
# passed, the app runs in DRY-RUN: it logs the crop and the exact prompt that WOULD
# be sent, and never loads or calls the VLM. That is how the detection leg is
# validated live without touching the VLM.
vlm_enabled=true
# VLM model directory on the board (already pulled). Used only in real (non-dry-run) mode.
vlm_model_dir=/media/nvme/llima/models/Qwen3-VL-4B-Instruct-GPTQ-a16w4

# Trigger gating: which detections deserve an (expensive) VLM call.
# Comma-separated COCO class allow-list (empty = any class).
vlm_trigger_classes=person
# Minimum detection confidence to trigger.
vlm_trigger_min_score=0.55
# Crop must cover at least this fraction of the frame (skip tiny/far objects).
vlm_trigger_min_area_frac=0.02

# Rate limit: minimum seconds between VLM calls (the VLM cannot run per frame).
vlm_interval_seconds=5.0
# Bounded in-flight/queued crops. Full queue => drop trigger (backpressure).
vlm_max_pending=1

# Dedup: treat a box as the same object if IoU >= vlm_dedup_iou; a given object can
# re-trigger only after vlm_dedup_cooldown_s. Stops one person re-firing every frame.
vlm_dedup_iou=0.6
vlm_dedup_cooldown_s=15.0

# Generation controls.
vlm_max_new_tokens=96
# Prompt template; {label} is substituted with the detected class (lower-case).
vlm_prompt=You are watching a security camera. This image is a crop of one detected {label}. Describe what this {label} is doing and anything notable in one short sentence.
