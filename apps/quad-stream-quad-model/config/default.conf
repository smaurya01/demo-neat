# quad-stream-quad-model — 4 RTSP streams -> 4 DIFFERENT models -> 4 UDP sinks.
# Edit for your host/RTSP/ports.
#
# Each stream slot has its OWN RTSP URL below. Every slot builds its own source
# graph, so each URL is a separate RTSP connection and a separate H.264 decode —
# four streams means four real decodes, not one decode fanned out. The four URLs
# are the same source here, which is a valid 4-stream load; point them at four
# different cameras and stream identity still holds end to end (each slot owns
# its model graph and its UDP port).

# Fallback used by any slot that does not set its own stream<i>_rtsp below.
rtsp_default=rtsp://192.168.2.105:8555/stream
rtsp_transport=tcp

# How many stream slots to run (1..4 use the built-in defaults; drop to 2 to
# land a lighter, guaranteed-sustaining pipeline — see README/TEACHING).
num_streams=4

# --- per-stream RTSP source (slot i) ---
# All four are the same URL for now; replace individually for distinct cameras.
stream0_rtsp=rtsp://192.168.2.105:8555/stream
stream1_rtsp=rtsp://192.168.2.105:8555/stream
stream2_rtsp=rtsp://192.168.2.105:8555/stream
stream3_rtsp=rtsp://192.168.2.105:8555/stream

# --- per-stream routing (slot i). task in: detection|segmentation|pose|yolox ---
# model is optional; if omitted it defaults to the compiled archive for the task
# from ./assets/models/ (local copies; git-ignored).
stream0_task=detection
stream1_task=segmentation
stream2_task=pose
stream3_task=yolox

# Model archives (local copies -- the app is self-contained and does not depend on
# ../../model-compilation/work/, which is a regenerable build directory).
stream0_model=./assets/models/yolo11s.compile_ready_mpk.tar.gz
stream1_model=./assets/models/yolo11s-seg.compile_ready_mpk.tar.gz
stream2_model=./assets/models/yolo26s-pose.compile_ready_mpk.tar.gz
stream3_model=./assets/models/yolox_s.compile_ready_mpk.tar.gz


# Host/IP that receives the annotated H.264/RTP UDP output streams.
udp_host=192.168.2.105
# Stream i publishes on udp_port_base + i*udp_port_stride unless stream<i>_port is set.
udp_port_base=5206
udp_port_stride=2

# Model input geometry (all four archives are 640x640).
model_width=640
model_height=640

# Fallbacks used when RTSP caps are incomplete.
fallback_width=1280
fallback_height=720
fallback_fps=30

# RTSP receiver jitter buffer (ms).
latency_ms=200

# Host-decode thresholds (also used by the built-in detection decode).
score_threshold=0.25
nms_iou=0.50
top_k=100

# Per-graph bounded queue depth (Realtime preset, KeepLatest overflow).
queue_depth=3

# H.264 output encoder bitrate (kbps).
bitrate_kbps=4000

# Frames PER stream; 0 = run until interrupted.
frames=0

# Print generated backend pipelines when true.
print_backend=false
