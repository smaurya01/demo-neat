# quad-stream-quad-model — 4 RTSP streams -> 4 DIFFERENT models -> 4 UDP sinks.
# Edit for your host/RTSP/ports.
#
# Each stream slot has its OWN RTSP URL below. Every slot builds its own source
# graph, so each URL is a separate RTSP connection and a separate H.264 decode —
# four streams means four real decodes, not one decode fanned out. The four URLs
# are the same source here, which is a valid 4-stream load; point them at four
# different cameras and stream identity still holds end to end (each slot owns
# its model graph and its UDP port).

# Fallback used by any slot that does not set its own stream<i>_rtsp below.
rtsp_default=rtsp://<rtsp-server-ip>:8555/stream
rtsp_transport=tcp

# How many stream slots to run (1..4 use the built-in defaults; drop to 2 to
# land a lighter, higher-FPS pipeline — see README.md / LEARNING.md).
num_streams=4

# --- per-stream RTSP source (slot i) ---
# All four are the same URL for now; replace individually for distinct cameras.
stream0_rtsp=rtsp://<rtsp-server-ip>:8555/stream
stream1_rtsp=rtsp://<rtsp-server-ip>:8555/stream
stream2_rtsp=rtsp://<rtsp-server-ip>:8555/stream
stream3_rtsp=rtsp://<rtsp-server-ip>:8555/stream

# --- per-stream routing (slot i). task in: detection|segmentation|pose|yolox ---
# model is optional; if omitted it defaults to the archive for the task from
# ./assets/models/ (local copies; git-ignored).
#
# The task also selects the Neat ON-DEVICE decode family (main.py DECODE_FAMILY).
# Nothing is decoded on the host:
#   detection    -> BoxDecodeType.YoloV8      (zoo head: 64-ch DFL bbox + 80-ch class)
#   segmentation -> BoxDecodeType.YoloV8Seg   (+ 32-ch mask coeffs + 32x160 prototype)
#   pose         -> BoxDecodeType.YoloV26Pose (4-ch l/t/r/b + 1-ch score + 51-ch kpt)
#   yolox        -> BoxDecodeType.YoloX       (per scale: 4-ch box, 1-ch obj, 80-ch class)
stream0_task=detection
stream1_task=segmentation
stream2_task=pose
stream3_task=yolox

# Model archives.
#
# Streams 0 and 1 come straight from the SiMa model zoo -- no compilation needed:
#   sima-cli modelzoo -v 2.1.2 --boardtype modalix get yolo_11s
#   sima-cli modelzoo -v 2.1.2 --boardtype modalix get yolo_11s_seg
#
# Streams 2 and 3 are NOT in the zoo (it publishes no YOLO-pose and no YOLOX), so
# they are built by the graph-surgery flow in ../../model-compilation. See README.
stream0_model=./assets/models/yolo_11s_mpk.tar.gz
stream1_model=./assets/models/yolo_11s_seg_mpk.tar.gz
stream2_model=./assets/models/yolo26s-pose.compile_ready_mpk.tar.gz
stream3_model=./assets/models/yolox_s.compile_ready_mpk.tar.gz


# Host/IP that receives the annotated H.264/RTP UDP output streams.
udp_host=<udp-server-ip>
# Stream i publishes on udp_port_base + i*udp_port_stride unless stream<i>_port is set.
udp_port_base=5206
udp_port_stride=2

# Model input geometry (all four archives are 640x640).
model_width=640
model_height=640

# Fallbacks used when RTSP caps are incomplete.
fallback_width=1280
fallback_height=720
fallback_fps=30

# RTSP receiver jitter buffer (ms).
latency_ms=200

# Detection thresholds. These are passed into the ON-DEVICE BoxDecode stage
# (ModelOptions.score_threshold / nms_iou_threshold / top_k), so the NMS runs on the
# accelerator -- the host never sees a sub-threshold box.
score_threshold=0.25
nms_iou=0.50
top_k=100

# Source/video graph queue depth (Realtime preset, KeepLatest overflow).
queue_depth=3

# Frames the MODEL graph may hold in flight at once.
#
# This is the app's real backpressure, and it is enforced by the pusher thread, not by the
# Neat overflow policy. OverflowPolicy::Block does NOT bound in-graph buffering: a Neat graph
# has a large internal edge queue, and push() returns as soon as the frame lands in it. Any
# model slower than the source then outruns it and the queue fills toward its physical limit
# -- measured: segmentation reached ~600 frames in flight and 11 SECONDS of latency, while
# still reporting a healthy 59 fps because it was draining a backlog.
#
# The pusher will not hand the graph a frame beyond this bound; excess frames are dropped at
# the source mailbox, which is where a live camera should shed load. Raise it for a little
# more MLA overlap, lower it for lower latency.
model_queue_depth=4

# Frames parked between the puller and the output thread (postproc + overlay + encode).
# Each parked frame holds a ZeroCopy model output buffer, so keep this small.
output_queue_depth=2

# Seconds between live time-profile prints. 0 = only print the summary at exit.
profile_interval=5

# Where the model's pre (tessellate/quantize) and post (detessellate/dequantize) CVU
# stages run: AUTO | EV74 | A65.
#
# Pin them to the EV74. AUTO lets the planner decide and it does not always pick the
# accelerator -- measured over 4 streams x 15s on this pipeline:
#     AUTO  -> 76.7 fps aggregate delivered
#     EV74  -> 86.5 fps aggregate delivered
# (Historically AUTO was far worse: it once put yolo26s-pose's post stage on the A65
# at ~1.8 s/frame, which starved the other three streams entirely.)
cvu_pre_target=EV74
cvu_post_target=EV74

# H.264 output encoder bitrate (kbps).
bitrate_kbps=4000

# Frames PER stream; 0 = run until interrupted.
frames=0

# Print generated backend pipelines when true.
print_backend=false
