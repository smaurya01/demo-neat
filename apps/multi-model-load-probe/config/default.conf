# Edit these values for your host and RTSP source before running.
rtsp_url=rtsp://<rtsp-server-ip>:8555/stream
rtsp_transport=tcp
udp_host=<host-ip-that-receives-video>
udp_port_base=5201

models_dir=assets/models
only=
allow_missing=false
load_only=false

model_width=640
model_height=640
fallback_width=1280
fallback_height=720
fallback_fps=25
latency_ms=200

score_threshold=0.25
nms_iou=0.50
top_k=100
num_classes=80
frames=0
bitrate_kbps=4000
print_backend=false
