# Edit these values for your host and RTSP sources before running.
# Two RTSP H.264 input streams, each decoded independently.
# By design for now both point at the SAME source; change either to a distinct
# camera/stream URL and stream identity is still preserved end to end.
rtsp_url_0=rtsp://<rtsp-server-ip>:8555/stream
rtsp_url_1=rtsp://<rtsp-server-ip>:8555/stream

# RTSP transport mode; use tcp for reliability or udp for lower latency.
rtsp_transport=tcp

# Host/IP that receives the annotated UDP/RTP output streams.
udp_host=<host-ip-that-receives-video>

# Base UDP/RTP output port. Stream i publishes on udp_port_base + i*udp_port_stride,
# so with the defaults stream 0 -> 5206 and stream 1 -> 5208.
udp_port_base=5206
udp_port_stride=2

# YOLO11 model archive loaded by the shared Neat model stage.
model_path=./assets/models/yolo_11n_mpk.tar.gz

# Decode family, selected by how the archive's detection head is shaped:
#   yolov8  => BoxDecodeType.YoloV8   raw 64-channel DFL bbox heads + 80 class heads.
#             This is what the model zoo `yolo_11n` archive ships, so it is the
#             default here.
#   yolo11  => BoxDecodeType.YoloV26  4-channel l/t/r/b distance heads. Only correct
#             for a self-compiled archive, whose graph surgery folds the DFL into
#             the model. See the Model Build appendix in README.md.
# Setting this wrong still runs, but decodes boxes from the wrong channels.
model_name=yolov8

# Model input width used by Neat preprocessing.
model_width=640

# Model input height used by Neat preprocessing.
model_height=640

# Fallback decoded frame width used when RTSP caps are incomplete.
fallback_width=1280

# Fallback decoded frame height used when RTSP caps are incomplete.
fallback_height=720

# Fallback decoded stream FPS used when RTSP caps are incomplete.
fallback_fps=60

# RTSP receiver latency buffer in milliseconds.
latency_ms=200

# Minimum decoded detection score to draw.
score_threshold=0.25

# NMS IoU threshold used by Neat box decode.
nms_iou=0.50

# Maximum decoded detections per frame.
top_k=100

# Number of detection classes in the model output.
num_classes=80

# Number of frames to process PER stream; 0 runs until interrupted.
frames=0

# H.264 output encoder bitrate in kbps.
bitrate_kbps=4000

# Print generated backend pipelines when true.
print_backend=false

# Frames per stream excluded from the reported FPS and stage means. Graph build,
# model load and RTSP jitter-buffer fill all land on the first few frames.
warmup_frames=20

# Frames the shared model Run keeps in flight. With OverflowPolicy.Block this is
# what pipelines the MLA — the proven C++ 4-stream demo uses 4.
model_queue_depth=4

# Bounded hand-off depth per stream (input queue and result queue).
stream_queue_depth=4
