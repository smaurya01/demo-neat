# Edit these values for your host and RTSP source before running.
# RTSP H.264 input stream consumed by the source graph.
rtsp_url=rtsp://<rtsp-server-ip>:8555/stream

# RTSP transport mode; use tcp for reliability or udp for lower latency.
rtsp_transport=tcp

# Host/IP running Neat Insight; receives both the video and metadata streams.
insight_host=<host-ip-that-receives-video>

# Insight channel. video_port = video_port_base + channel,
# metadata_port = metadata_port_base + channel. Video and metadata must share
# the channel or overlays land on the wrong viewer tile.
channel=0

# UDP video port base used by the H.264 video sender (Insight default 9000).
video_port_base=9000

# UDP metadata port base used by the metadata sender (Insight default 9100).
metadata_port_base=9100

# YOLO11 model archive loaded by the Neat model node.
model_path=./assets/models/yolo_11n_mpk.tar.gz

# Model input width used by Neat preprocessing.
model_width=640

# Model input height used by Neat preprocessing.
model_height=640

# Fallback decoded frame width used when RTSP caps are incomplete.
fallback_width=1280

# Fallback decoded frame height used when RTSP caps are incomplete.
fallback_height=720

# Fallback decoded stream FPS used when RTSP caps are incomplete.
fallback_fps=60

# RTSP receiver latency buffer in milliseconds.
latency_ms=200

# Minimum decoded detection score to publish as metadata.
score_threshold=0.6

# NMS IoU threshold used by Neat box decode.
nms_iou=0.50

# Maximum decoded detections per frame.
top_k=100

# Number of detection classes in the model output.
num_classes=80

# Number of frames to process; 0 runs until interrupted.
frames=0

# H.264 output encoder bitrate in kbps.
bitrate_kbps=4000

# Print generated backend pipelines when true.
print_backend=false
