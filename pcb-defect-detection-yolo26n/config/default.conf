# PLC (PCB) defect detection — runtime config (key=value).
# Edit before running. CLI flags to main.py override these values.

# Compiled Modalix MLA model pack (runs on the DevKit MLA).
model=assets/models/plc_yolo26n_mpk.tar.gz

# Input folder of PCB images / output folder for annotated results.
input_dir=sample_input_images
output_dir=output_images
output_suffix=_detected

# Inference / on-device box-decode tuning.
infer_size=640
score=0.25
nms=0.45
top_k=300
timeout_ms=8000

# Index-aligned class names baked into the trained YOLO26n checkpoint.
labels=missing_hole,mouse_bite,open_circuit,short,spur,spurious_copper
