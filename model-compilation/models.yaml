# Single registry for the whole compile flow.
#
# Every step (convert_to_onnx -> graph_surgery -> compiler -> test_model) reads THIS file, so a
# model's input name, shape, normalization and output contract can never drift between steps.
#
# Key fields
#   surgery      : none | yolo_ultralytics | yolox   (which rewrite graph_surgery.py applies)
#   output_names : the EXACT tensors the compiled archive exposes (surgery models expose raw heads)
#   decode       : how test_model.py interprets the outputs
#
# Calibration is ALWAYS real images (assets/calibration). Synthetic calibration produces a
# valid-looking archive with meaningless activation ranges -- see README.

project:
  default_device: modalix
  default_opset: 17
  default_calib_method: mse
  default_requant_mode: sima
  default_layout: NCHW
  default_num_calib_samples: 20
  calib_dir: assets/calibration      # REAL images. never synthetic.
  infer_dir: assets/inference        # REAL images for the smoke test.

models:
  # ----------------------------------------------------------------- classification (CNN)
  # Plain CNNs: no surgery needed, they compile straight from the export.
  - id: resnet50
    task: classification
    family: torchvision
    arch: resnet50
    weights: ResNet50_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.resnet50.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: densenet169
    task: classification
    family: torchvision
    arch: densenet169
    weights: DenseNet169_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.densenet169.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: convnext_tiny
    task: classification
    family: torchvision
    arch: convnext_tiny
    weights: ConvNeXt_Tiny_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.convnext_tiny.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: efficientnet_v2_s
    task: classification
    family: torchvision
    arch: efficientnet_v2_s
    weights: EfficientNet_V2_S_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.efficientnet_v2_s.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 384, 384]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  # ----------------------------------------------------------------- detection (YOLO)
  # These need surgery: the CPU decode/NMS tail is cut and the raw per-scale heads are exposed,
  # which is what lets the whole graph stay on the MLA (one ELF, no .so).
  # Preprocess is handled by Neat (COCO_YOLO preset), so mean=0 / std=1 here.
  - id: yolo11n
    task: detection
    family: ultralytics
    arch: yolo11n.pt
    source: https://docs.ultralytics.com/models/yolo11/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo11s
    task: detection
    family: ultralytics
    arch: yolo11s.pt
    source: https://docs.ultralytics.com/models/yolo11/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo26n
    task: detection
    family: ultralytics
    arch: yolo26n.pt
    source: https://docs.ultralytics.com/
    license_note: Confirm upstream/license for the YOLO26 variant before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo11s-seg
    task: segmentation
    family: ultralytics
    arch: yolo11s-seg.pt
    source: https://docs.ultralytics.com/tasks/segment/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2,
                   mask_coeff_0, mask_coeff_1, mask_coeff_2, proto]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo26s-pose
    task: pose
    family: ultralytics
    arch: yolo26s-pose.pt
    source: https://docs.ultralytics.com/tasks/pose/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2,
                   kpt_0, kpt_1, kpt_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  # ── DIAGNOSTIC VARIANTS of yolo26s-pose — NOT for deployment ────────────────
  # yolo26s-pose runs at 0.5 fps (~1.8 s/frame), and the cost is in the compiled
  # post-MLA tail, not the MLA (its MLA cycle count is only 1.21x yolo11s, and no
  # runtime option moves the number). Every one of its 9 outputs gets its own
  # `slice_transform` stage, while the fast models fuse most outputs into a single
  # `ofm_unpack_transform`. Pose is also the ONLY model with C=1 and C=51 outputs.
  # Each variant drops one suspect so the culprit is measured, not guessed:
  #   -nokpt  bbox(4) + class(1) only  -> if FAST, the 51-ch kpt heads are the cost
  #   -nocls  bbox(4) + kpt(51)  only  -> if FAST, the 1-ch class heads are the cost
  # Both share yolo26s-pose's ONNX export. `enabled: false` keeps them out of --all.
  - id: yolo26s-pose-nokpt
    task: pose
    family: ultralytics
    arch: yolo26s-pose.pt
    source: diagnostic variant of yolo26s-pose (keypoint heads removed)
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: false

  # CANDIDATE FIX: keypoint head zero-padded 51 -> 64 channels so every output's
  # channel count aligns to the MLA tiling. Keeps all information; the host decoder
  # reads channels 0..50 and ignores the padding.
  - id: yolo26s-pose-kpt64
    task: pose
    family: ultralytics
    arch: yolo26s-pose.pt
    source: yolo26s-pose with the keypoint head zero-padded to 64 channels
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2,
                   kpt_0, kpt_1, kpt_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: false

  - id: yolo26s-pose-nocls
    task: pose
    family: ultralytics
    arch: yolo26s-pose.pt
    source: diagnostic variant of yolo26s-pose (class-logit heads removed)
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, kpt_0, kpt_1, kpt_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: false

  # Non-Ultralytics head (decoupled, anchor-free, numeric node names) -> its own surgery path.
  - id: yolox_s
    task: detection
    family: megvii
    arch: yolox_s
    source: https://github.com/Megvii-BaseDetection/YOLOX/releases/download/0.1.1rc0/yolox_s.onnx
    license_note: Megvii YOLOX (Apache-2.0); review before redistribution.
    surgery: yolox
    decode: yolo_raw_heads
    input_name: images
    output_names: [yolox_head_0, yolox_head_1, yolox_head_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true
