project:
  default_device: modalix
  default_opset: 17
  default_num_calib_samples: 50
  default_calib_method: mse
  default_requant_mode: sima
  default_layout: NCHW

models:
  - id: resnet50
    task: classification
    family: torchvision
    arch: resnet50
    weights: ResNet50_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.resnet50.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: densenet169
    task: classification
    family: torchvision
    arch: densenet169
    weights: DenseNet169_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.densenet169.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: convnext_tiny
    task: classification
    family: torchvision
    arch: convnext_tiny
    weights: ConvNeXt_Tiny_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.convnext_tiny.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: efficientnet_v2_s
    task: classification
    family: torchvision
    arch: efficientnet_v2_s
    weights: EfficientNet_V2_S_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.efficientnet_v2_s.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 384, 384]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: vit_b_16
    task: classification
    family: torchvision
    arch: vit_b_16
    weights: ViT_B_16_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.vit_b_16.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: maxvit_t
    task: classification
    family: torchvision
    arch: maxvit_t
    weights: MaxVit_T_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.maxvit_t.html
    license_note: TorchVision/PyTorch model weights; review upstream weight metadata before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: fastvit_t8
    task: classification
    family: timm
    arch: fastvit_t8.apple_in1k
    source: https://github.com/apple/ml-fastvit
    license_note: Apple FastViT model; install timm or upstream package and review license before redistribution.
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 256, 256]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: dinov2_vits14
    task: feature
    family: torchhub
    arch: dinov2_vits14
    source: https://github.com/facebookresearch/dinov2
    license_note: DINOv2 weights/source require license review before redistribution.
    input_name: input
    output_names: [features]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: yolo11n
    task: detection
    family: ultralytics
    arch: yolo11n.pt
    source: https://docs.ultralytics.com/models/yolo11/
    license_note: Ultralytics model/license must be reviewed before redistribution.
    input_name: images
    output_names: []
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo26n
    task: detection
    family: ultralytics
    arch: yolo26n.pt
    source: https://docs.ultralytics.com/
    license_note: Confirm public upstream and license for the exact YOLO26 variant before redistribution.
    input_name: images
    output_names: []
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true
    blocked_reason: exact public upstream/weight name still needs confirmation if export fails.

  - id: detr_resnet50
    task: detection
    family: torchhub
    arch: detr_resnet50
    source: https://github.com/facebookresearch/detr
    license_note: DETR source/weights require license review before redistribution.
    input_name: input
    output_names: [pred_logits, pred_boxes]
    input_shape: [1, 3, 800, 800]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: false
    blocked_reason: DETR export and postprocess should be attempted after CNN and YOLO baselines.
