# Single registry for the whole compile flow.
#
# Every step (convert_to_onnx -> graph_surgery -> compiler -> test_model) reads THIS file, so a
# model's input name, shape, normalization and output contract can never drift between steps.
#
# Key fields
#   surgery      : none | yolo_ultralytics | yolox   (which rewrite graph_surgery.py applies)
#   output_names : the EXACT tensors the compiled archive exposes (surgery models expose raw heads)
#   decode       : how test_model.py interprets the outputs
#
# Calibration is ALWAYS real images (assets/calibration). Synthetic calibration produces a
# valid-looking archive with meaningless activation ranges -- see README.

project:
  default_device: modalix
  default_opset: 17
  default_calib_method: mse
  default_requant_mode: sima
  default_layout: NCHW
  default_num_calib_samples: 20
  calib_dir: assets/calibration      # REAL images. never synthetic.
  infer_dir: assets/inference        # REAL images for the smoke test.

models:
  # ----------------------------------------------------------------- classification (CNN)
  # Plain CNNs: no surgery needed, they compile straight from the export.
  - id: resnet50
    task: classification
    family: torchvision
    arch: resnet50
    weights: ResNet50_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.resnet50.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: densenet169
    task: classification
    family: torchvision
    arch: densenet169
    weights: DenseNet169_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.densenet169.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: convnext_tiny
    task: classification
    family: torchvision
    arch: convnext_tiny
    weights: ConvNeXt_Tiny_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.convnext_tiny.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 224, 224]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  - id: efficientnet_v2_s
    task: classification
    family: torchvision
    arch: efficientnet_v2_s
    weights: EfficientNet_V2_S_Weights.DEFAULT
    source: https://docs.pytorch.org/vision/main/models/generated/torchvision.models.efficientnet_v2_s.html
    license_note: TorchVision weights; review upstream license before redistribution.
    surgery: none
    decode: imagenet_topk
    input_name: input
    output_names: [logits]
    input_shape: [1, 3, 384, 384]
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    enabled: true

  # ----------------------------------------------------------------- detection (YOLO)
  # These need surgery: the CPU decode/NMS tail is cut and the raw per-scale heads are exposed,
  # which is what lets the whole graph stay on the MLA (one ELF, no .so).
  # Preprocess is handled by Neat (COCO_YOLO preset), so mean=0 / std=1 here.
  - id: yolo11n
    task: detection
    family: ultralytics
    arch: yolo11n.pt
    source: https://docs.ultralytics.com/models/yolo11/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo11s
    task: detection
    family: ultralytics
    arch: yolo11s.pt
    source: https://docs.ultralytics.com/models/yolo11/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo26n
    task: detection
    family: ultralytics
    arch: yolo26n.pt
    source: https://docs.ultralytics.com/
    license_note: Confirm upstream/license for the YOLO26 variant before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo11s-seg
    task: segmentation
    family: ultralytics
    arch: yolo11s-seg.pt
    source: https://docs.ultralytics.com/tasks/segment/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2,
                   mask_coeff_0, mask_coeff_1, mask_coeff_2, proto]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  - id: yolo26s-pose
    task: pose
    family: ultralytics
    arch: yolo26s-pose.pt
    source: https://docs.ultralytics.com/tasks/pose/
    license_note: Ultralytics license must be reviewed before redistribution.
    surgery: yolo_ultralytics
    decode: yolo_raw_heads
    input_name: images
    output_names: [bbox_0, bbox_1, bbox_2, class_logit_0, class_logit_1, class_logit_2,
                   kpt_0, kpt_1, kpt_2]
    input_shape: [1, 3, 640, 640]
    mean: [0.0, 0.0, 0.0]
    std: [1.0, 1.0, 1.0]
    enabled: true

  # Non-Ultralytics head (decoupled, anchor-free, numeric node names) -> its own surgery path.
  - id: yolox_s
    task: detection
    family: megvii
    arch: yolox_s
    source: https://github.com/Megvii-BaseDetection/YOLOX/releases/download/0.1.1rc0/yolox_s.onnx
    license_note: Megvii YOLOX (Apache-2.0); review before redistribution.
    surgery: yolox
    # Split decoupled heads, scale-major (bbox, obj, cls) triplets with depths (4,1,80).
    # This is BoxDecodeType::YoloX (Split3Interleaved) -> decoded on-device by Neat.
    # obj/class are PRE-sigmoid logits; Neat applies the sigmoid itself.
    decode: yolox_split_heads
    input_name: images
    output_names:
      - bbox_0
      - obj_logit_0
      - class_logit_0
      - bbox_1
      - obj_logit_1
      - class_logit_1
      - bbox_2
      - obj_logit_2
      - class_logit_2
    input_shape: [1, 3, 640, 640]
    # YOLOX is NOT normalized like the Ultralytics models. mean/std are applied in
    # normalized [0,1] space -- the preprocessor always divides by 255 first, then does
    # (x - mean) / std. Ultralytics wants exactly x/255, so it uses mean=0, std=1.
    #
    # Megvii YOLOX is trained on RAW 0-255 pixels, so std = 1/255 cancels the built-in
    # division and hands the model the raw pixel value back.
    #
    # Getting this wrong is silent and total: with std=1 the model sees an image 255x too
    # dark, every objectness logit pins negative (obj_max -8.4 vs +5.9 on the same frame,
    # measured on COCO val 000000000139), and YOLOX detects NOTHING while still running at
    # full speed and reporting healthy FPS.
    mean: [0.0, 0.0, 0.0]
    std: [0.00392156862745098, 0.00392156862745098, 0.00392156862745098]
    enabled: true
