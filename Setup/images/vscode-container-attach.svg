<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">VS Code attach to NEAT SDK container workflow</title>
  <desc id="desc">A simple guide showing the VS Code command palette, attaching to a running sima-neat SDK container, and opening the workspace folder.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#253044" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1180" height="560" rx="0" fill="#f6f7fb"/>
  <rect x="42" y="36" width="1096" height="488" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1096" height="42" rx="8" fill="#202b3d"/>
  <circle cx="68" cy="57" r="6" fill="#ff6b6b"/>
  <circle cx="90" cy="57" r="6" fill="#ffd166"/>
  <circle cx="112" cy="57" r="6" fill="#06d6a0"/>
  <text x="590" y="63" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#e7edf7">Visual Studio Code - NEAT SDK Container</text>

  <rect x="76" y="104" width="320" height="364" rx="6" fill="#eef2f7"/>
  <text x="102" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">1. Command Palette</text>
  <rect x="102" y="172" width="268" height="54" rx="6" fill="#ffffff" stroke="#c8d2e0"/>
  <text x="124" y="205" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">Ctrl + Shift + P</text>
  <rect x="102" y="248" width="268" height="118" rx="6" fill="#ffffff" stroke="#c8d2e0"/>
  <text x="122" y="282" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#111827">Dev Containers:</text>
  <text x="122" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Attach to Running</text>
  <text x="122" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Container...</text>
  <text x="102" y="416" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#536173">Start from the host VS Code window.</text>

  <rect x="430" y="104" width="320" height="364" rx="6" fill="#eef2f7"/>
  <text x="456" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">2. Select Container</text>
  <rect x="456" y="172" width="268" height="196" rx="6" fill="#ffffff" stroke="#c8d2e0"/>
  <rect x="474" y="196" width="232" height="48" rx="5" fill="#dbeafe" stroke="#2563eb"/>
  <text x="492" y="225" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">sima-neat/sdk</text>
  <rect x="474" y="260" width="232" height="42" rx="5" fill="#f8fafc" stroke="#d7dde8"/>
  <text x="492" y="286" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">other-container</text>
  <rect x="474" y="316" width="232" height="34" rx="5" fill="#f8fafc" stroke="#d7dde8"/>
  <text x="492" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">...</text>
  <text x="456" y="416" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#536173">Choose the NEAT SDK image installed by sima-cli.</text>

  <rect x="784" y="104" width="320" height="364" rx="6" fill="#eef2f7"/>
  <text x="810" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">3. Open Folder</text>
  <rect x="810" y="172" width="268" height="196" rx="6" fill="#ffffff" stroke="#c8d2e0"/>
  <rect x="832" y="196" width="224" height="42" rx="5" fill="#f8fafc" stroke="#d7dde8"/>
  <text x="852" y="223" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">/</text>
  <rect x="832" y="252" width="224" height="48" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="852" y="282" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">/workspace</text>
  <rect x="832" y="316" width="224" height="34" rx="5" fill="#f8fafc" stroke="#d7dde8"/>
  <text x="852" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">/opt/sima</text>
  <text x="810" y="416" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#536173">Build and run examples from the shared workspace.</text>

  <line x1="398" y1="286" x2="426" y2="286" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="752" y1="286" x2="780" y2="286" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="456" y="456" width="268" height="34" rx="17" fill="#e0f2fe"/>
  <text x="590" y="478" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#075985">Container context: sima-neat/sdk</text>
</svg>
